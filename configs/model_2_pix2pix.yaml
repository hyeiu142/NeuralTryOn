model:
  name: gmm_shape_generation_pix2pix
  image_size: [512, 384]
  stage_1_input_channels: 26
  stage_2_generator_input_channels: 12
  stage_2_discriminator_input_channels: 15

data:
  batch_size: 4
  num_workers: 2
  seed: 42

training:
  gmm:
    epochs: 15
    learning_rate: 0.0001
    automatic_weighted_loss_learning_rate: 0.001
    optimizer: Adam
    scheduler: ReduceLROnPlateau
    scheduler_factor: 0.5
    scheduler_patience: 3
    early_stopping_patience: 3
    min_delta: 0.001
    loss_weights:
      l1: 1.0
      vgg: 0.2
      mask: 0.5
  shape_generation:
    epochs: 15
    learning_rate: 0.00005
    automatic_weighted_loss_learning_rate: 0.001
    optimizer: Adam
    scheduler: ReduceLROnPlateau
    scheduler_factor: 0.5
    scheduler_patience: 2
    early_stopping_patience: 3
    min_delta: 0.001
  pix2pix:
    epochs: 30
    generator_learning_rate: 0.0002
    discriminator_learning_rate: 0.00001
    optimizer: Adam
    optimizer_betas: [0.5, 0.999]
    scheduler: ReduceLROnPlateau
    scheduler_factor: 0.5
    scheduler_patience: 4
    early_stopping_patience: 10
    min_delta: 0.001
    loss_weights:
      l1: 0.5
      vgg: 10.0
      gan: 1.5
      sobel: 5.0
      skin: 5.0
      full_region: 10.0
      mask: 20.0

tracking:
  backend: notebook_history_and_checkpoints

