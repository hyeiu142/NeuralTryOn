model:
  name: lightweight_unet_gmm_tom
  image_size: [512, 384]

data:
  batch_size: 8
  num_workers: 2
  seed: 42

training:
  unet:
    epochs: 20
    learning_rate: 0.0001
    optimizer: Adam
    early_stopping_patience: 5
    min_delta: 0.0001
  gmm:
    epochs: 15
    learning_rate: 0.00001
    optimizer: Adam
    early_stopping_patience: 5
    min_delta: 0.0001
  tom:
    epochs: 30
    optimizer: Adam
    optimizer_betas: [0.5, 0.999]
    scheduler: ReduceLROnPlateau
    scheduler_factor: 0.5
    scheduler_patience: 2
    early_stopping_patience: 5
    min_delta: 0.0001

ablation:
  - name: Baseline_No_Dropout
    learning_rate: 0.0001
    dropout: 0.0
  - name: With_Dropout_0.3
    learning_rate: 0.0001
    dropout: 0.3
  - name: Low_LR_5e_5
    learning_rate: 0.00005
    dropout: 0.0
  - name: High_LR_5e_4
    learning_rate: 0.0005
    dropout: 0.0

tracking:
  backend: TensorBoard
  notebook_log_pattern: runs/TOM_Experiment_{config_name}

